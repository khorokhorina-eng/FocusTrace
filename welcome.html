<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Welcome - PDF Text to Speech</title>
    <link rel="stylesheet" href="welcome.css" />
  </head>
  <body>
    <main class="page">
      <section class="content">
        <h1>PDF Text to Speech Installed</h1>
        <p class="lead">
          Click the puzzle piece (1) in the top right of your browser. Then,
          click the little pin (2) next to the extension:
        </p>
        <div class="shot">
          <img
            src="welcome-pin.svg"
            alt="Open the extensions menu and pin the extension"
          />
        </div>

        <p class="lead">
          Open the extension (3) on any page to start using PDF Text to Speech:
        </p>
        <div class="shot">
          <img
            src="welcome-use.svg"
            alt="The extension pinned in the toolbar"
          />
        </div>
      </section>
    </main>
  </body>
</html>

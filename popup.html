<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PDF Text to Speech</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="container">
      <h1>PDF Text to Speech</h1>
      <p id="status" class="status">Ready</p>
      <div class="controls">
        <button id="play" class="primary">Read Aloud</button>
        <button id="pause" class="secondary">Pause</button>
        <button id="stop" class="secondary">Stop</button>
      </div>
      <button id="openFile" class="secondary hidden">Open PDF File</button>
      <input id="fileInput" type="file" accept="application/pdf" hidden />
      <label class="speed">
        Speed
        <select id="speed">
          <option value="0.75">0.75x</option>
          <option value="1" selected>1x</option>
          <option value="1.25">1.25x</option>
          <option value="1.5">1.5x</option>
        </select>
      </label>
      <div id="account" class="account">
        <div class="account-row">
          <span id="authStatus">Checking access…</span>
          <div class="account-actions">
            <button id="upgradeButton" class="secondary small hidden">
              Get Access
            </button>
          </div>
        </div>
        <label class="plan-select hidden" id="planSelectRow">
          Plan
          <select id="planSelect">
            <option value="monthly">Monthly · $9.99 · 6 hours</option>
            <option value="annual">Annual · $89.99 · 72 hours</option>
            <option value="addon_3h">Add-on · 3 hours · $5.99</option>
            <option value="addon_5h">Add-on · 5 hours · $8.99</option>
            <option value="addon_10h">Add-on · 10 hours · $15.99</option>
            <option value="addon_20h">Add-on · 20 hours · $27.99</option>
          </select>
        </label>
        <div class="account-links">
          <button id="portalButton" class="secondary small hidden">
            Manage subscription
          </button>
        </div>
        <p id="trialInfo" class="hint hidden"></p>
        <p id="tokenInfo" class="hint hidden"></p>
      </div>
      <p id="hint" class="hint">Open a PDF in Chrome to start.</p>
    </main>
    <script src="config.js"></script>
    <script src="popup.js"></script>
  </body>
</html>

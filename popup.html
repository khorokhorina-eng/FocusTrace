<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PDF Text to Speech</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="container">
      <h1>PDF Text to Speech</h1>
      <p id="status" class="status">Ready</p>
      <div class="controls">
        <button id="play" class="primary">Read Aloud</button>
        <button id="pause" class="secondary">Pause</button>
        <button id="stop" class="secondary">Stop</button>
      </div>
      <button id="openFile" class="secondary hidden">Open PDF File</button>
      <input id="fileInput" type="file" accept="application/pdf" hidden />
      <label class="speed">
        Speed
        <select id="speed">
          <option value="0.75">0.75x</option>
          <option value="1" selected>1x</option>
          <option value="1.25">1.25x</option>
          <option value="1.5">1.5x</option>
        </select>
      </label>
      <div id="account" class="account">
        <p id="authStatus" class="account-status">Checking access...</p>
        <div id="paywallCard" class="paywall-card hidden">
          <h2>Unlock all features</h2>
          <p class="paywall-subtitle">
            Get daily updates, crafted for you. Cancel anytime.
          </p>
          <div id="planToggle" class="plan-toggle">
            <button type="button" class="plan-option" data-plan="monthly">
              <span>Monthly</span>
              <span class="plan-price">$9.99</span>
            </button>
            <button
              type="button"
              class="plan-option selected"
              data-plan="annual"
            >
              <span>Annual</span>
              <span class="plan-badge">Most popular</span>
              <span class="plan-price">$89.99</span>
            </button>
          </div>
          <button id="checkoutButton" class="primary paywall-cta">
            Subscribe
          </button>
          <div id="addonSection" class="addon-section hidden">
            <p class="addon-title">Need extra hours?</p>
            <div class="addon-grid">
              <button type="button" class="secondary addon-option" data-plan="addon_3h">
                3 hours · $5.99
              </button>
              <button type="button" class="secondary addon-option" data-plan="addon_5h">
                5 hours · $8.99
              </button>
              <button type="button" class="secondary addon-option" data-plan="addon_10h">
                10 hours · $15.99
              </button>
              <button type="button" class="secondary addon-option" data-plan="addon_20h">
                20 hours · $27.99
              </button>
            </div>
          </div>
        </div>
        <div class="account-links">
          <button id="portalButton" class="secondary small hidden">
            Manage subscription
          </button>
        </div>
        <p id="tokenInfo" class="hint hidden"></p>
      </div>
      <p id="hint" class="hint">Open a PDF in Chrome to start.</p>
    </main>
    <script src="config.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
